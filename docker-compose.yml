services:
  db:
    image: postgres:15
    environment:
      POSTGRES_DB: wodanalytics
      POSTGRES_USER: woduser
      POSTGRES_PASSWORD: wodpass
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  api:
    build: .
    command: python manage.py runserver 0.0.0.0:8000
    volumes:
      - .:/app
    ports:
      - "8000:8000"
    environment:
      - DEBUG=1
      - DB_NAME=wodanalytics
      - DB_USER=woduser
      - DB_PASSWORD=wodpass
      - DB_HOST=db
      - DB_PORT=5432
    depends_on:
      - db

volumes:
  postgres_data: